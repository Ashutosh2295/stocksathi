<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Card body -->
  <rect x="3" y="7" width="18" height="11" rx="2" fill="url(#cardGrad)" opacity="0.4" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Magnetic stripe -->
  <rect x="3" y="10" width="18" height="2" fill="#1e293b" opacity="0.7"/>
  <!-- Chip -->
  <rect x="5.5" y="13" width="4" height="3" rx="0.5" fill="#fbbf24" opacity="0.8" stroke="#f59e0b" stroke-width="1"/>
  <line x1="6.5" y1="13.5" x2="6.5" y2="15.5" stroke="#d97706" stroke-width="0.5"/>
  <line x1="8.5" y1="13.5" x2="8.5" y2="15.5" stroke="#d97706" stroke-width="0.5"/>
  <!-- Card number lines -->
  <line x1="12" y1="14" x2="17" y2="14" stroke="#94a3b8" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="12" y1="15.5" x2="15" y2="15.5" stroke="#94a3b8" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <!-- Transaction indicator -->
  <circle cx="18.5" cy="8.5" r="1" fill="#10b981" opacity="0.8"/>
</svg>
