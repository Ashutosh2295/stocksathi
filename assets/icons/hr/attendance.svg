<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="attendanceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Calendar background -->
  <rect x="4" y="5" width="16" height="16" rx="2" fill="url(#attendanceGrad)" opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
  <!-- Calendar header -->
  <rect x="4" y="5" width="16" height="3" rx="2" fill="url(#attendanceGrad)" opacity="0.5"/>
  <!-- Calendar binding rings -->
  <circle cx="7" cy="4" r="0.8" fill="#10b981"/>
  <circle cx="12" cy="4" r="0.8" fill="#10b981"/>
  <circle cx="17" cy="4" r="0.8" fill="#10b981"/>
