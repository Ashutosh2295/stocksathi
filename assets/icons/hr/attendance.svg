  <path d="M 9.5 13 L 10.5 14 L 12 12" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 13 15.5 L 14 16.5 L 15.5 14.5" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 16.5 18 L 17.5 19 L 19 17" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
