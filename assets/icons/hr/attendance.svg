  <line x1="8.7" y1="9" x2="8.7" y2="20" stroke="#10b981" stroke-width="0.6" opacity="0.3"/>
  <line x1="12.3" y1="9" x2="12.3" y2="20" stroke="#10b981" stroke-width="0.6" opacity="0.3"/>
  <line x1="15.9" y1="9" x2="15.9" y2="20" stroke="#10b981" stroke-width="0.6" opacity="0.3"/>
  <!-- Grid lines horizontal -->
  <line x1="5" y1="11.7" x2="19" y2="11.7" stroke="#10b981" stroke-width="0.6" opacity="0.3"/>
  <line x1="5" y1="14.3" x2="19" y2="14.3" stroke="#10b981" stroke-width="0.6" opacity="0.3"/>
  <line x1="5" y1="16.9" x2="19" y2="16.9" stroke="#10b981" stroke-width="0.6" opacity="0.3"/>
