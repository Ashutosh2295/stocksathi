<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="deptGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Top box (CEO/Head) -->
  <rect x="9" y="3" width="6" height="4" rx="1" fill="url(#deptGrad)" opacity="0.6" stroke="#8b5cf6" stroke-width="1.5"/>
  <!-- Connecting lines -->
  <line x1="12" y1="7" x2="12" y2="10" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="6" y1="10" x2="18" y2="10" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="6" y1="10" x2="6" y2="13" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="12" y1="10" x2="12" y2="13" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="18" y1="10" x2="18" y2="13" stroke="#8b5cf6" stroke-width="1.5"/>
  <!-- Department boxes -->
  <rect x="2" y="13" width="5" height="3.5" rx="0.8" fill="url(#deptGrad)" opacity="0.4" stroke="#3b82f6" stroke-width="1.2"/>
  <rect x="9.5" y="13" width="5" height="3.5" rx="0.8" fill="url(#deptGrad)" opacity="0.4" stroke="#3b82f6" stroke-width="1.2"/>
  <rect x="17" y="13" width="5" height="3.5" rx="0.8" fill="url(#deptGrad)" opacity="0.4" stroke="#3b82f6" stroke-width="1.2"/>
  <!-- Sub-department lines -->
  <line x1="4.5" y1="16.5" x2="4.5" y2="19" stroke="#3b82f6" stroke-width="1"/>
  <line x1="2.5" y1="19" x2="6.5" y2="19" stroke="#3b82f6" stroke-width="1"/>
  <line x1="2.5" y1="19" x2="2.5" y2="20.5" stroke="#3b82f6" stroke-width="1"/>
  <line x1="6.5" y1="19" x2="6.5" y2="20.5" stroke="#3b82f6" stroke-width="1"/>
  <!-- Sub boxes -->
  <circle cx="2.5" cy="21" r="0.8" fill="#3b82f6"/>
  <circle cx="6.5" cy="21" r="0.8" fill="#3b82f6"/>
</svg>
