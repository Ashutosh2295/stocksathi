<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="leaveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Calendar background -->
  <rect x="4" y="5" width="16" height="16" rx="2" fill="url(#leaveGrad)" opacity="0.2" stroke="#f97316" stroke-width="1.5"/>
  <!-- Calendar header -->
  <rect x="4" y="5" width="16" height="3" rx="2" fill="url(#leaveGrad)" opacity="0.5"/>
  <!-- Calendar binding rings -->
  <circle cx="7" cy="4" r="0.8" fill="#f97316"/>
  <circle cx="12" cy="4" r="0.8" fill="#f97316"/>
  <circle cx="17" cy="4" r="0.8" fill="#f97316"/>
  <!-- Beach umbrella pole -->
  <line x1="12" y1="18" x2="12" y2="12" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Beach umbrella canopy -->
  <path d="M 8 12 Q 12 9 16 12" fill="#f97316" opacity="0.6" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Umbrella segments -->
  <line x1="10" y1="12" x2="11" y2="10" stroke="#dc2626" stroke-width="0.8"/>
  <line x1="14" y1="12" x2="13" y2="10" stroke="#dc2626" stroke-width="0.8"/>
  <!-- Sun rays -->
  <circle cx="17" cy="10" r="1" fill="#fbbf24" opacity="0.7"/>
  <line x1="17" y1="8.5" x2="17" y2="7.5" stroke="#fbbf24" stroke-width="0.8" opacity="0.6"/>
  <line x1="18.5" y1="10" x2="19.5" y2="10" stroke="#fbbf24" stroke-width="0.8" opacity="0.6"/>
  <line x1="15.5" y1="10" x2="14.5" y2="10" stroke="#fbbf24" stroke-width="0.8" opacity="0.6"/>
  <line x1="18.2" y1="8.8" x2="19" y2="8" stroke="#fbbf24" stroke-width="0.8" opacity="0.6"/>
</svg>
