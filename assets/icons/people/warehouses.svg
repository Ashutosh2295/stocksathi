<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="warehouseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main warehouse building -->
  <rect x="3" y="9" width="18" height="12" rx="1" fill="url(#warehouseGrad)" opacity="0.4" stroke="#64748b" stroke-width="1.5"/>
  <!-- Roof -->
  <path d="M 2 9 L 12 3 L 22 9" fill="url(#warehouseGrad)" opacity="0.6" stroke="#475569" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Roof peak -->
  <line x1="12" y1="3" x2="12" y2="9" stroke="#475569" stroke-width="1.2"/>
  <!-- Loading dock doors -->
  <rect x="5" y="14" width="4" height="6" rx="0.3" fill="#1e293b" opacity="0.6" stroke="#0f172a" stroke-width="1"/>
  <rect x="10" y="14" width="4" height="6" rx="0.3" fill="#1e293b" opacity="0.6" stroke="#0f172a" stroke-width="1"/>
  <rect x="15" y="14" width="4" height="6" rx="0.3" fill="#1e293b" opacity="0.6" stroke="#0f172a" stroke-width="1"/>
  <!-- Door slats -->
  <line x1="5" y1="16" x2="9" y2="16" stroke="#334155" stroke-width="0.5"/>
  <line x1="5" y1="18" x2="9" y2="18" stroke="#334155" stroke-width="0.5"/>
  <line x1="10" y1="16" x2="14" y2="16" stroke="#334155" stroke-width="0.5"/>
  <line x1="10" y1="18" x2="14" y2="18" stroke="#334155" stroke-width="0.5"/>
  <line x1="15" y1="16" x2="19" y2="16" stroke="#334155" stroke-width="0.5"/>
  <line x1="15" y1="18" x2="19" y2="18" stroke="#334155" stroke-width="0.5"/>
  <!-- Small office window -->
  <rect x="18" y="10" width="2" height="2" rx="0.3" fill="#06b6d4" opacity="0.6"/>
</svg>
