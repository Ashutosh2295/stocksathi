  <line x1="11" y1="7" x2="10" y2="9" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <line x1="15" y1="7" x2="14" y2="9" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <line x1="19" y1="7" x2="18" y2="9" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <!-- Building -->
  <rect x="5" y="9" width="14" height="12" rx="1" fill="url(#storeGrad)" opacity="0.3" stroke="#f97316" stroke-width="1.5"/>
  <!-- Windows/Display -->
  <rect x="7" y="11" width="4" height="5" rx="0.5" fill="#fef3c7" opacity="0.6" stroke="#fbbf24" stroke-width="1"/>
  <rect x="13" y="11" width="4" height="5" rx="0.5" fill="#fef3c7" opacity="0.6" stroke="#fbbf24" stroke-width="1"/>
  <!-- Door -->
