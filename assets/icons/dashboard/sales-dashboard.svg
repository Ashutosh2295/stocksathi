<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="salesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Cash register base -->
  <rect x="4" y="12" width="16" height="8" rx="1.5" fill="url(#salesGrad)" opacity="0.3" stroke="url(#salesGrad)" stroke-width="1.5"/>
  <!-- Display screen -->
  <rect x="6" y="6" width="12" height="5" rx="1" fill="url(#salesGrad)" opacity="0.2" stroke="url(#salesGrad)" stroke-width="1.5"/>
  <!-- Currency symbol -->
  <text x="12" y="9.5" font-family="Arial, sans-serif" font-size="3" font-weight="bold" fill="#10b981" text-anchor="middle">₹</text>
  <!-- Buttons/keys -->
  <circle cx="8" cy="15.5" r="0.8" fill="#fbbf24"/>
  <circle cx="12" cy="15.5" r="0.8" fill="#fbbf24"/>
  <circle cx="16" cy="15.5" r="0.8" fill="#fbbf24"/>
  <!-- Money indicator -->
  <path d="M 16 2 L 20 2 L 20 7 L 16 7 Z" fill="url(#salesGrad)" opacity="0.4" stroke="#10b981" stroke-width="1.2"/>
  <circle cx="18" cy="4.5" r="1" fill="none" stroke="#10b981" stroke-width="1"/>
</svg>
