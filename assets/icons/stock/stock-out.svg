  </defs>
  <!-- Warehouse/box -->
  <rect x="5" y="4" width="14" height="10" rx="1.5" fill="url(#stockOutGrad)" opacity="0.3" stroke="url(#stockOutGrad)" stroke-width="1.5"/>
