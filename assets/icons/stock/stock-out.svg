  <path d="M 4 4 L 12 0 L 20 4" fill="none" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Outbound arrow -->
  <path d="M 12 12 L 12 22" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
  <path d="M 9 19 L 12 22 L 15 19" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner detail -->
  <rect x="8" y="7" width="3" height="3" rx="0.5" fill="#f97316" opacity="0.5"/>
