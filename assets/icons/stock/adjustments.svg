<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="adjustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Slider track top -->
  <rect x="4" y="7" width="16" height="2" rx="1" fill="url(#adjustGrad)" opacity="0.3"/>
  <!-- Slider track middle -->
  <rect x="4" y="11" width="16" height="2" rx="1" fill="url(#adjustGrad)" opacity="0.3"/>
  <!-- Slider track bottom -->
  <rect x="4" y="15" width="16" height="2" rx="1" fill="url(#adjustGrad)" opacity="0.3"/>
  <!-- Slider knob top -->
  <circle cx="14" cy="8" r="2.5" fill="url(#adjustGrad)" opacity="0.6" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="14" cy="8" r="1.2" fill="#8b5cf6"/>
  <!-- Slider knob middle -->
  <circle cx="9" cy="12" r="2.5" fill="url(#adjustGrad)" opacity="0.6" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="9" cy="12" r="1.2" fill="#8b5cf6"/>
  <!-- Slider knob bottom -->
  <circle cx="16" cy="16" r="2.5" fill="url(#adjustGrad)" opacity="0.6" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="1.2" fill="#8b5cf6"/>
</svg>
