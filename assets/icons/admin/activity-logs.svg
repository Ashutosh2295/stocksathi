<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="logsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Document -->
  <rect x="5" y="2" width="14" height="20" rx="1.5" fill="url(#logsGrad)" opacity="0.2" stroke="#64748b" stroke-width="1.5"/>
  <!-- Log entries -->
  <line x1="8" y1="6" x2="16" y2="6" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="8" y1="9" x2="16" y2="9" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="8" y1="12" x2="16" y2="12" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="8" y1="15" x2="16" y2="15" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="8" y1="18" x2="13" y2="18" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Timestamps (dots) -->
  <circle cx="8" cy="6" r="0.7" fill="#3b82f6"/>
  <circle cx="8" cy="9" r="0.7" fill="#3b82f6"/>
  <circle cx="8" cy="12" r="0.7" fill="#3b82f6"/>
  <circle cx="8" cy="15" r="0.7" fill="#3b82f6"/>
  <circle cx="8" cy="18" r="0.7" fill="#3b82f6"/>
  <!-- Clock overlay -->
  <circle cx="16.5" cy="18" r="3.5" fill="#64748b" opacity="0.8" stroke="#475569" stroke-width="1.2"/>
  <line x1="16.5" y1="18" x2="16.5" y2="16" stroke="#e0f2fe" stroke-width="1" stroke-linecap="round"/>
  <line x1="16.5" y1="18" x2="18" y2="18" stroke="#e0f2fe" stroke-width="1" stroke-linecap="round"/>
</svg>
