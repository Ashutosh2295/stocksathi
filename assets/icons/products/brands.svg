<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="shineGrad" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Badge outer circle -->
  <circle cx="12" cy="12" r="9" fill="url(#badgeGrad)" opacity="0.3" stroke="url(#badgeGrad)" stroke-width="2"/>
  <!-- Badge inner circle -->
  <circle cx="12" cy="12" r="7" fill="url(#badgeGrad)" opacity="0.5" stroke="#f59e0b" stroke-width="1.5"/>
