  <!-- Decorative points -->
  <circle cx="12" cy="3.5" r="0.8" fill="#fbbf24"/>
  <circle cx="20.5" cy="12" r="0.8" fill="#fbbf24"/>
  <circle cx="12" cy="20.5" r="0.8" fill="#fbbf24"/>
  <circle cx="3.5" cy="12" r="0.8" fill="#fbbf24"/>
</svg>
