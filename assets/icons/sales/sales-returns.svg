<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="returnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Box -->
  <rect x="8" y="8" width="10" height="10" rx="1" fill="url(#returnGrad)" opacity="0.3" stroke="#f97316" stroke-width="1.5"/>
  <!-- Box flaps -->
  <line x1="8" y1="8" x2="13" y2="13" stroke="#ea580c" stroke-width="1" opacity="0.5"/>
  <line x1="18" y1="8" x2="13" y2="13" stroke="#ea580c" stroke-width="1" opacity="0.5"/>
  <!-- Return arrow -->
  <path d="M 6 12 Q 3 8 6 4" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <path d="M 6 7 L 6 4 L 3 4" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Curved arrow from box -->
  <path d="M 8 13 L 6 12" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
</svg>
