<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="invoiceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Document -->
  <rect x="5" y="2" width="14" height="20" rx="1.5" fill="url(#invoiceGrad)" opacity="0.3" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Header lines -->
  <line x1="8" y1="5" x2="16" y2="5" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="8" x2="13" y2="8" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Item lines -->
  <line x1="8" y1="11" x2="16" y2="11" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="8" y1="13.5" x2="16" y2="13.5" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="8" y1="16" x2="16" y2="16" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Currency symbol -->
  <text x="15" y="20" font-family="Arial, sans-serif" font-size="4" font-weight="bold" fill="#3b82f6" text-anchor="middle">₹</text>
  <!-- Total line -->
  <line x1="8" y1="18.5" x2="16" y2="18.5" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
</svg>
