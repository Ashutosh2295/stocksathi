<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="bellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Bell top nub -->
  <rect x="11" y="3" width="2" height="1.5" rx="0.5" fill="#3b82f6" opacity="0.7"/>
  <!-- Bell body -->
  <path d="M 7 17 Q 7 10 12 7 Q 17 10 17 17 Z" fill="url(#bellGrad)" opacity="0.4" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Bell rim -->
  <path d="M 6 17 Q 6 17 12 18.5 Q 18 17 18 17" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bell clapper -->
  <ellipse cx="12" cy="19" rx="1.5" ry="2" fill="#8b5cf6" opacity="0.6"/>
  <!-- Notification indicator dot -->
  <circle cx="17" cy="7" r="2.5" fill="#ef4444" opacity="0.9" stroke="#fff" stroke-width="1"/>
  <!-- Sound waves -->
  <path d="M 18 11 Q 19 11 20 10" fill="none" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M 19 13 Q 20.5 13 21.5 12" fill="none" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
