<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="logoutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Door frame -->
  <rect x="4" y="3" width="11" height="18" rx="1.5" fill="url(#logoutGrad)" opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Door panel detail -->
  <rect x="6" y="5" width="7" height="7" rx="0.5" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <rect x="6" y="13" width="7" height="7" rx="0.5" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <!-- Door handle -->
  <circle cx="11" cy="12.5" r="0.8" fill="#dc2626"/>
  <!-- Exit arrow -->
  <path d="M 14 12 L 21 12" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 18 9 L 21 12 L 18 15" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
