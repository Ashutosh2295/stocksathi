<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="searchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Search circle -->
  <circle cx="10" cy="10" r="7" fill="none" stroke="url(#searchGrad)" stroke-width="2"/>
  <!-- Magnifying glass handle -->
  <line x1="15" y1="15" x2="21" y2="21" stroke="url(#searchGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Inner circle highlight -->
  <circle cx="10" cy="10" r="4" fill="url(#searchGrad)" opacity="0.2"/>
</svg>
