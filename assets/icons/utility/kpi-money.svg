<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="kpiMoneyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Coin stack - coin 1 (bottom) -->
  <ellipse cx="12" cy="18" rx="6" ry="2" fill="url(#kpiMoneyGrad)" opacity="0.4" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Coin 2 -->
  <ellipse cx="12" cy="15.5" rx="6" ry="2" fill="url(#kpiMoneyGrad)" opacity="0.5" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Coin 3 -->
  <ellipse cx="12" cy="13" rx="6" ry="2" fill="url(#kpiMoneyGrad)" opacity="0.6" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Coin 4 (top) -->
  <ellipse cx="12" cy="10.5" rx="6" ry="2" fill="url(#kpiMoneyGrad)" opacity="0.7" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Currency symbol on top coin -->
  <text x="12" y="11.5" font-family="Arial, sans-serif" font-size="3" font-weight="bold" fill="#d97706" text-anchor="middle">₹</text>
  <!-- Sparkle effect -->
  <path d="M 4 8 L 4.5 9.5 L 3.5 9.5 Z M 4 11 L 4.5 9.5 L 3.5 9.5 Z" fill="#fbbf24" opacity="0.8"/>
  <path d="M 19 6 L 19.5 7.5 L 18.5 7.5 Z M 19 9 L 19.5 7.5 L 18.5 7.5 Z" fill="#10b981" opacity="0.8"/>
</svg>
