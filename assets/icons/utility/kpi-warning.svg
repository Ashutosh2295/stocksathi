<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="kpiWarningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Warning triangle -->
  <path d="M 12 3 L 22 20 L 2 20 Z" fill="url(#kpiWarningGrad)" opacity="0.3" stroke="#f97316" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Inner triangle -->
  <path d="M 12 5.5 L 20 19 L 4 19 Z" fill="url(#kpiWarningGrad)" opacity="0.5" stroke="#fbbf24" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Exclamation mark stem -->
  <rect x="11" y="10" width="2" height="5" rx="1" fill="#dc2626"/>
  <!-- Exclamation mark dot -->
  <circle cx="12" cy="17" r="1.2" fill="#dc2626"/>
  <!-- Alert glow -->
  <circle cx="12" cy="12" r="6" fill="#fbbf24" opacity="0.1"/>
</svg>
