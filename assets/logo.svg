<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo Icon - Stacked boxes representing inventory -->
  <defs>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main box stack -->
  <rect x="5" y="25" width="18" height="18" rx="2" fill="url(#boxGradient)" opacity="0.9"/>
  <rect x="10" y="18" width="18" height="18" rx="2" fill="url(#boxGradient)" opacity="0.95"/>
  <rect x="15" y="11" width="18" height="18" rx="2" fill="url(#boxGradient)"/>
  
  <!-- Checkmark on top box -->
  <path d="M 20 17 L 23 21 L 29 15" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text "Stocksathi" -->
  <text x="45" y="38" font-family="'Inter', 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#1E293B">
    Stock<tspan fill="#0D9488">sathi</tspan>
  </text>
</svg>
